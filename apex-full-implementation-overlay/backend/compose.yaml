services:
  db:
    image: postgres:16-alpine
    container_name: apex-postgres
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex
    ports:
      - "5432:5432"
    volumes:
      - apex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex"]
      interval: 5s
      timeout: 3s
      retries: 20

  test-db:
    image: postgres:16-alpine
    container_name: apex-postgres-test
    environment:
      POSTGRES_DB: apex_test
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles:
      - test

  migrate:
    image: golang:1.23-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      DATABASE_URL: postgres://apex:apex@db:5432/apex?sslmode=disable
    command: >
      sh -c "
        apk add --no-cache git &&
        go run github.com/pressly/goose/v3/cmd/goose@v3.24.1
        -dir ./migrations postgres \"$${DATABASE_URL}\" up
      "
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-api
    environment:
      HTTP_ADDR: :8080
      APP_ENV: dev
      LOG_LEVEL: debug
      DATABASE_URL: postgres://apex:apex@db:5432/apex?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - app

volumes:
  apex_pgdata:
  go-mod-cache:
  go-build-cache:
